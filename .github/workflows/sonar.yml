name: SonarQube Cloud Analysis

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    services:
      product-db:
        image: postgres:16
        env:
          POSTGRES_DB: product_db
          POSTGRES_USER: product_user
          POSTGRES_PASSWORD: product_pass
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U product_user -d product_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - service-name: product-service
            working-directory: ./product-service
            java-version: "17"
            project-key: Dulara07_E-Commerce-Store-product-service
          - service-name: order-service
            working-directory: ./order-service
            java-version: "21"
            project-key: Dulara07_E-Commerce-Store-order-service
          - service-name: notification-service
            working-directory: ./notification-service
            java-version: "21"
            project-key: Dulara07_E-Commerce-Store-notification-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven
          cache-dependency-path: ${{ matrix.working-directory }}/pom.xml

      - name: Make Maven wrapper executable
        working-directory: ${{ matrix.working-directory }}
        run: chmod +x mvnw

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        working-directory: ${{ matrix.working-directory }}
        run: |
          ./mvnw clean verify sonar:sonar \
          -Dsonar.projectKey=${{ matrix.project-key }} \
          -Dsonar.organization=dulara07 \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.token=$SONAR_TOKEN