name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service-name: product-service
            working-directory: product-service
            java-version: '17'
            project-key: Dulara07_E-Commerce-Store-product-service
          - service-name: order-service
            working-directory: order-service
            java-version: '21'
            project-key: Dulara07_E-Commerce-Store-order-service
          - service-name: notification-service
            working-directory: notification-service
            java-version: '21'
            project-key: Dulara07_E-Commerce-Store-notification-service

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin
          cache: maven
          cache-dependency-path: ${{ matrix.working-directory }}/pom.xml

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar-${{ matrix.service-name }}
          restore-keys: |
            ${{ runner.os }}-sonar-

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles(format('{0}/pom.xml', matrix.working-directory)) }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Make Maven wrapper executable
        working-directory: ${{ matrix.working-directory }}
        run: chmod +x mvnw

      - name: Build and analyze
        working-directory: ${{ matrix.working-directory }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw -B clean verify sonar:sonar \
            -Dsonar.projectKey=${{ matrix.project-key }} \
            -Dsonar.organization=dulara07