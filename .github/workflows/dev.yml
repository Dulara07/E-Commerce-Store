name: Product Service CI

on:
  push:
    branches:
      - main # Triggers when you push to main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Matches docker-compose.yml's product-db service so the Spring Boot
    # datasource config (localhost:5433/product_db) works unchanged in CI.
    services:
      product-db:
        image: postgres:16
        env:
          POSTGRES_DB: product_db
          POSTGRES_USER: product_user
          POSTGRES_PASSWORD: product_pass
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U product_user -d product_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: product-service

    steps:
      # Step 1: Check out the repository code
      - name: Check out repository
        uses: actions/checkout@v4

      # Step 2: Set up JDK 17 (matches java.version in pom.xml)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: product-service/pom.xml

      # Step 3: mvnw isn't tracked as executable in git, so make it runnable on Linux
      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      # Step 4: Build and run tests with the Maven wrapper
      - name: Build and test with Maven
        run: ./mvnw clean verify

      # Step 5: Hand the built jar off to the deploy job (only used when this
      # workflow run goes on to deploy)
      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: product-service-jar
          path: product-service/target/*.jar

  deploy:
    needs: build-and-test
    # Only deploy on a real push to main, not on pull request builds
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: product-service-jar
          path: product-service/target

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: product-service/target/*.jar
