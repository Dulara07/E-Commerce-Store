spring.application.name=product-service
server.port=8081

# Database Configuration (Docker container port is 5433)
spring.datasource.url=jdbc:postgresql://localhost:5433/product_db
spring.datasource.username=product_user
spring.datasource.password=product_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Swagger / OpenAPI UI Configuration
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator health endpoint (used for Azure App Service health checks and
# manual "is the app + DB actually up" checks). show-details defaults to
# "never" so failure causes aren't leaked publicly; override via the
# MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS app setting if you need to see
# component-level errors while diagnosing an issue.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never