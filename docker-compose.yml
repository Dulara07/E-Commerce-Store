services:
  product-db:
    image: postgres:16
    container_name: product-db
    restart: always
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: product_user     # Specification එකේ තියෙන විදිහට
      POSTGRES_PASSWORD: product_pass # Specification එකේ තියෙන විදිහට (ඔයාට කැමති රහස්පදයක් දිය හැක)
    ports:
      - "5433:5432"                   # Local port 5433 එක Postgres port 5432 ට map කර ඇත
    volumes:
      - product_data:/var/lib/postgresql/data

  order-db:
    image: postgres:16
    container_name: order-db
    restart: always
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"    # matches order-service's default SPRING_DATASOURCE_URL
    volumes:
      - order_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"    # AMQP port used by Order/Notification Service
      - "15672:15672"  # Management UI: http://localhost:15672 (guest/guest)

  # Application services
  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-service
    restart: always
    depends_on:
      - product-db
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://product-db:5432/product_db
      - SPRING_DATASOURCE_USERNAME=product_user
      - SPRING_DATASOURCE_PASSWORD=product_pass
      - SERVER_PORT=8081

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    restart: always
    depends_on:
      - order-db
      - rabbitmq
      - product-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://order-db:5432/order_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SERVER_PORT=8082
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - PRODUCT_SERVICE_URL=http://product-service:8081

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    restart: always
    depends_on:
      - rabbitmq
    ports:
      - "8083:8083"
    environment:
      - SERVER_PORT=8083
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672

volumes:
  product_data:
  order_data: